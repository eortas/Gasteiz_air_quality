name: Pipeline diario + Dashboard

on:
  schedule:
    - cron: '10 22 * * *'   # 22:10 UTC (00:10 AM hora española en verano / 23:10 en invierno)
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

permissions:
  contents: write           # necesario para hacer git push del index.html

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 3500

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── 3. Dependencias ──────────────────────────────────────────────────────
      - name: Instalar dependencias del pipeline
        run: |
          pip install --upgrade pip
          pip install \
            pandas>=2.0 numpy>=1.24 \
            scikit-learn>=1.3 lightgbm>=4.0 scipy>=1.11 statsmodels>=0.14 \
            requests>=2.31 playwright>=1.40 \
            supabase>=2.0 python-dotenv>=1.0 \
            loguru>=0.7 joblib>=1.3 python-dateutil>=2.8 tqdm>=4.66 \
            pyarrow>=14.0.0 matplotlib>=3.7 seaborn>=0.13 \
            holidays>=0.30 optuna>=3.0

      - name: Instalar Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 4. Pipeline completo ─────────────────────────────────────────────────
      - name: Ejecutar pipeline (ingesta → features → modelo → predicción)
        run: python run_pipeline.py --local-only

      # ── 5. Asegurar archivos para la web ─────────────────────────────────────
      - name: Sincronizar archivos para la web
        run: |
          cp reports/html/traffic_map.html . || true
          cp reports/html/*.png . || true
          ls -lh index.html || true

      # ── 7. Commit y push ─────────────────────────────────────────────────────
      - name: Publicar dashboard en GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git add traffic_map.html || true
          git add "**/*.png" || true
          git add data/processed/*.json || true
          git add data/raw/traffic/*.csv.gz || true
          git add data/raw/air/*.csv.gz || true
          git add data/raw/weather/*.csv.gz || true
          git add data/raw/**/checkpoint_air.json || true
          git add data/processed/predictions_latest.json || true
          git add data/processed/station_daily.csv || true
          git add models/synthetic_control_v9.json || true
          git diff --staged --quiet || git commit -m "dashboard + data + bot: actualización automática $(date -u '+%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push

      # ── 8. Upload to GitHub Releases ─────────────────────────────────────────
      - name: Actualizar datos en GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Si la release no existe, la crea
          gh release view latest-data || gh release create latest-data --title "Latest Data" --notes "CSVs comprimidos actualizados automáticamente"
          
          # Sube/sobrescribe los archivos
          gh release upload latest-data data/raw/traffic/*.csv.gz data/raw/air/*.csv.gz data/raw/weather/*.csv.gz --clobber
